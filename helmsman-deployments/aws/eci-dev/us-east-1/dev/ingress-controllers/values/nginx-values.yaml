# NGINX Ingress Controller Helm values - dev environment
# Chart: ingress-nginx/ingress-nginx
# IngressClass: nginx (set as default)

controller:
  replicaCount: 1   # dev: single replica; prod: 2+

  # ── IngressClass ────────────────────────────────────────────────────────────
  ingressClassResource:
    name: nginx
    enabled: true
    default: true       # Make nginx the cluster default IngressClass
    controllerValue: "k8s.io/ingress-nginx"

  ingressClass: nginx

  # ── AWS NLB via AWS Load Balancer Controller ─────────────────────────────────
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "external"
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

  # ── Resources ────────────────────────────────────────────────────────────────
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # ── Metrics (scraped by Prometheus) ─────────────────────────────────────────
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false
      namespace: monitoring

  # ── Config ───────────────────────────────────────────────────────────────────
  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"
    log-format-escape-json: "true"

  # ── Autoscaling ──────────────────────────────────────────────────────────────
  autoscaling:
    enabled: false

defaultBackend:
  enabled: true
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "50m"
      memory: "64Mi"
