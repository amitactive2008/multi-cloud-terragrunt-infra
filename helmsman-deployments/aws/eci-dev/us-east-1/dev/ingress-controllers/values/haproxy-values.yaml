# HAProxy Ingress Controller Helm values - dev environment
# Chart: haproxytech/kubernetes-ingress
# IngressClass: haproxy (non-default — use ingress.ingressClassName: haproxy)

controller:
  replicaCount: 1

  # ── IngressClass ─────────────────────────────────────────────────────────────
  ingressClass: haproxy
  ingressClassResource:
    name: haproxy
    default: false    # nginx is the cluster default; haproxy is opt-in

  # ── AWS NLB ──────────────────────────────────────────────────────────────────
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "external"
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

  # ── Resources ────────────────────────────────────────────────────────────────
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # ── Metrics (scraped by Prometheus) ─────────────────────────────────────────
  serviceMonitor:
    enabled: true
    namespace: monitoring

  # ── HAProxy config ───────────────────────────────────────────────────────────
  config:
    timeout-connect: "5s"
    timeout-client: "50s"
    timeout-server: "50s"
    forwarded-for: "true"

  # ── Logging ──────────────────────────────────────────────────────────────────
  logging:
    level: info
    traffic: {}

defaultBackend:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "50m"
      memory: "64Mi"
