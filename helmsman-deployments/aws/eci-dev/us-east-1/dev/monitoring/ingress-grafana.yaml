---
# Grafana Ingress - Internal Access
# Deploy with: kubectl apply -f ingress-grafana.yaml -n monitoring

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    # nginx ingress annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/auth-type: basic
    # Uncomment below to enable basic auth (create secret first)
    # nginx.ingress.kubernetes.io/auth-secret: basic-auth
    # nginx.ingress.kubernetes.io/auth-realm: 'Grafana Authentication'
spec:
  ingressClassName: nginx
  rules:
    # OPTION 1: Hostname-based routing
    - host: grafana.dev-eks
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
    
    # OPTION 2: Uncomment below for multiple hostnames
    # - host: grafana.local
    #   http:
    #     paths:
    #       - path: /
    #         pathType: Prefix
    #         backend:
    #           service:
    #             name: kube-prometheus-stack-grafana
    #             port:
    #               number: 80

---
# Optional: Basic Auth Secret (if enabling auth above)
# Generate with: echo -n "admin:$(openssl passwd -crypt password123)" | base64
apiVersion: v1
kind: Secret
metadata:
  name: basic-auth
  namespace: monitoring
type: Opaque
data:
  # Uncomment and replace with actual base64-encoded "username:hashed-password"
  # auth: YWRtaW46JDEkc2FsdCQvSmJFSWZXeWU4YTZWdWZGLk8v
