# Helmsman Desired State File - Monitoring Stack
# Deploys: kube-prometheus-stack (Prometheus + Grafana + Alertmanager)
#          prometheus-blackbox-exporter
# Mirrors pattern: terragrunt/aws/eci-dev/us-east-1/dev/eks-addons/<component>/terragrunt.hcl

metadata:
  org: "eci"
  description: "Monitoring stack - Prometheus, Grafana, Alertmanager, Blackbox Exporter (internal ALB ingress applied by deploy script)"
  maintainer: "devops-team"
  envFile: ".env"

settings:
  kubeContext: "$KUBE_CONTEXT"
  storageBackend: "secret"

namespaces:
  monitoring:
    protected: false
    labels:
      environment: "$ENVIRONMENT"
      managed-by: "helmsman"
      account: "$ACCOUNT_NAME"

helmRepos:
  prometheus-community: "https://prometheus-community.github.io/helm-charts"

apps:
  kube-prometheus-stack:
    namespace: "monitoring"
    enabled: true
    chart: "prometheus-community/kube-prometheus-stack"
    version: "65.1.1"
    valuesFiles:
      - "values/kube-prometheus-stack-values.yaml"
    wait: true
    timeout: 600
    priority: -1
    description: "Kube Prometheus Stack (Prometheus + Grafana + Alertmanager)"

  # ── Blackbox Exporter ──────────────────────────────────────────────────────
  # Deployed after kube-prometheus-stack (priority 0) so the monitoring
  # namespace and Prometheus Operator CRDs already exist.
  prometheus-blackbox-exporter:
    namespace: "monitoring"
    enabled: true
    chart: "prometheus-community/prometheus-blackbox-exporter"
    version: "9.0.1"
    valuesFiles:
      - "values/blackbox-exporter-values.yaml"
    wait: true
    timeout: 300
    priority: 0
    description: "Blackbox Exporter - HTTP/TCP/ICMP endpoint probing"
