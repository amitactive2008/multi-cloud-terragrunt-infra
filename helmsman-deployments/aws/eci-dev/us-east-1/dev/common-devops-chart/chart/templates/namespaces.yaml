{{- range $team := .Values.teams }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $team.name | quote }}
  labels:
    app.kubernetes.io/managed-by: "common-devops-chart"
    {{- with $team.labels }}
{{ toYaml . | nindent 4 }}
    {{- end }}
  {{- with $team.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
{{- end }}