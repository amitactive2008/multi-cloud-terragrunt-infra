# Helmsman Desired State File - Autoscaling Stack (prod)
metadata:
  org: "eci"
  description: "Autoscaling stack - VPA and Prometheus Adapter for custom-metrics HPA"
  maintainer: "devops-team"
  envFile: ".env"

settings:
  kubeContext: "$KUBE_CONTEXT"
  storageBackend: "secret"

namespaces:
  kube-system:
    protected: false
    labels:
      environment: "$ENVIRONMENT"
      managed-by: "helmsman"
  monitoring:
    protected: false

helmRepos:
  fairwinds-stable: "https://charts.fairwinds.com/stable"
  prometheus-community: "https://prometheus-community.github.io/helm-charts"

apps:
  vpa:
    namespace: "kube-system"
    enabled: true
    chart: "fairwinds-stable/vpa"
    version: "4.7.3"
    valuesFiles:
      - "values/vpa-values.yaml"
    wait: true
    timeout: 300
    priority: -1
    description: "Vertical Pod Autoscaler"

  prometheus-adapter:
    namespace: "monitoring"
    enabled: true
    chart: "prometheus-community/prometheus-adapter"
    version: "4.11.0"
    valuesFiles:
      - "values/prometheus-adapter-values.yaml"
    wait: true
    timeout: 300
    priority: 0
    description: "Prometheus Adapter for custom-metrics HPA"
