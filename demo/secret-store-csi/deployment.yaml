# Sample Deployment — demonstrates mounting RDS credentials from AWS Secrets
# Manager via the Secrets Store CSI driver with EKS Pod Identity.
#
# What this creates:
#   - ServiceAccount  rds-sa          (must have a Pod Identity association)
#   - Deployment      rds-creds-test  (mounts secrets + exposes them as env vars)
#
# Apply order:
#   1. kubectl apply -f secret-provider-class.yaml
#   2. kubectl apply -f deployment.yaml
#
# Verify:
#   kubectl logs -l app=rds-creds-test -n default
#   kubectl get secret rds-credentials -n default -o yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rds-sa
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rds-creds-test
  namespace: default
  labels:
    app: rds-creds-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rds-creds-test
  template:
    metadata:
      labels:
        app: rds-creds-test
    spec:
      serviceAccountName: rds-sa

      containers:
        - name: test
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo '=== Mounted files ==='
              ls /mnt/secrets/
              echo
              echo '=== host ==='
              cat /mnt/secrets/host
              echo
              echo '=== dbname ==='
              cat /mnt/secrets/dbname
              echo
              echo '=== username ==='
              cat /mnt/secrets/username
              echo
              echo '=== Env vars ==='
              echo "DB_HOST=$DB_HOST"
              echo "DB_NAME=$DB_NAME"
              echo "DB_USER=$DB_USER"
              sleep 3600

          # Consume synced Kubernetes Secret fields as environment variables.
          # The Secret is created automatically once the volume is first mounted.
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: rds-credentials
                  key: host
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: rds-credentials
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: rds-credentials
                  key: username

          volumeMounts:
            - name: secrets
              mountPath: /mnt/secrets
              readOnly: true

          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

      volumes:
        - name: secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              # Must match metadata.name of the SecretProviderClass above.
              secretProviderClass: rds-credentials
