# SecretProviderClass — tells the AWS CSI provider which Secrets Manager secret
# to fetch and how to project its fields into a Kubernetes Secret.
#
# Prerequisites:
#   - secrets-store-csi-driver installed (kube-system)
#   - secrets-store-csi-driver-provider-aws installed (kube-system)
#   - EKS Pod Identity association created for <namespace>/<serviceAccountName>
#     → IAM role with secretsmanager:GetSecretValue on the secret ARN
#
# Apply:
#   kubectl apply -f secret-provider-class.yaml
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: rds-credentials
  namespace: default
spec:
  provider: aws
  parameters:
    # Use EKS Pod Identity for credential resolution (not IRSA).
    # The pod's service account must have a Pod Identity association.
    usePodIdentity: "true"

    # Secret to fetch and which JSON fields to extract.
    objects: |
      - objectName: "arn:aws:secretsmanager:us-east-1:088317451471:secret:dev/rds/credentials-Xl8O3N"
        objectType: "secretsmanager"
        jmesPath:
          - path: "username"
            objectAlias: "username"
          - path: "password"
            objectAlias: "password"
          - path: "host"
            objectAlias: "host"
          - path: "port"
            objectAlias: "port"
          - path: "dbname"
            objectAlias: "dbname"

  # Sync the mounted secrets into a native Kubernetes Secret so pods can also
  # consume them as environment variables via secretKeyRef.
  secretObjects:
    - secretName: rds-credentials
      type: Opaque
      data:
        - objectName: username
          key: username
        - objectName: password
          key: password
        - objectName: host
          key: host
        - objectName: port
          key: port
        - objectName: dbname
          key: dbname
