apiVersion: apps/v1
kind: Deployment
metadata:
  name: efs-test-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: efs-test
  template:
    metadata:
      labels:
        app: efs-test
    spec:
      containers:
        - name: writer
          image: alpine
          command: ["/bin/sh", "-c"]
          args:
            - while true; do
                echo "$(date) - Hello from Pod ${HOSTNAME}" >> /data/test.txt;
                sleep 5;
              done
          volumeMounts:
            - name: efs-storage
              mountPath: /data
        - name: web-server
          image: nginx:alpine
          volumeMounts:
            - name: efs-storage
              mountPath: /usr/share/nginx/html
      volumes:
        - name: efs-storage
          persistentVolumeClaim:
            claimName: efs-claim
